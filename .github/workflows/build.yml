name: Build & Test

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    # windows-latest ist nötig, weil LernTor.App (WPF) und LernTor.Security (net8.0-windows,
    # Win32-P/Invoke) nur unter Windows kompilieren.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: .NET 8 SDK einrichten
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: NuGet-Pakete wiederherstellen
        run: dotnet restore LernTor.sln

      - name: Solution bauen (Release)
        run: dotnet build LernTor.sln --configuration Release --no-restore

      - name: Unit-Tests ausführen
        run: dotnet test tests/LernTor.Tests/LernTor.Tests.csproj --configuration Release --no-build --verbosity normal

      - name: UI-Smoke-Tests ausführen (XAML-Load + Start der echten exe)
        # Fängt die XamlParseException-Bug-Klasse (kompiliert sauber, crasht erst beim Laden),
        # die kein Unit-Test abdecken kann - siehe tests/LernTor.UiTests.
        run: dotnet test tests/LernTor.UiTests/LernTor.UiTests.csproj --configuration Release --no-build --verbosity normal

      - name: Python für Content-Checks einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Längen-Bias-Wächter (Distraktoren dürfen nicht "richtig = längste Option" verraten)
        # Kinder lernen sonst schnell "nimm die längste Antwort" statt den Inhalt zu lesen -
        # siehe scripts/check-answer-length-bias.py. Schwelle 60% pro Generator, Zielwert der
        # Nachbesserungen liegt bei ~35% (nahe Zufallserwartung).
        run: python scripts/check-answer-length-bias.py

      - name: Self-contained Windows-Build veröffentlichen
        # Identische Flags wie der dokumentierte Release-Build (docs/BUILD.md), damit das
        # CI-Artefakt wirklich dem entspricht, was auch installiert wird: Single-File +
        # ReadyToRun (schneller Kaltstart nach dem Autostart-Login).
        run: >
          dotnet publish src/LernTor.App/LernTor.App.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishReadyToRun=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          --output publish/win-x64

      - name: Build-Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: LernTor-win-x64
          path: publish/win-x64
